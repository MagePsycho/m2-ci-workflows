name: M2 Extension Test (reusable)

on:
  workflow_call:
    inputs:
      composer_name:
        description: 'Composer package name, e.g. magepsycho/magento2-groupswitcherpro'
        required: true
        type: string
      module_name:
        description: 'Magento module name, e.g. MagePsycho_GroupSwitcherPro'
        required: true
        type: string
      module_source:
        description: 'Relative path within the repo where the module source (registration.php) lives.'
        required: false
        type: string
        default: 'src'

# GitHub Actions does not allow matrix-interpolated `uses:` paths, so each
# <PHP × Magento> cell is its own job. Keeps the matrix explicit and the
# pairings auditable. The services block is duplicated because GHA does
# not support YAML anchors in workflow files.
jobs:
  install-m248-php83:
    name: Install M2.4.8 / PHP 8.3
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports: ['3306:3306']
        options: >-
          --tmpfs /tmp:rw --tmpfs /var/lib/mysql:rw
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      es:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.22
        ports: ['9200:9200', '9300:9300']
        options: >-
          -e="discovery.type=single-node"
          -e="xpack.security.enabled=false"
          --health-cmd="curl -s http://localhost:9200/_cluster/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: extdn/github-actions-m2/magento-integration-tests/8.3@master
        with:
          module_name: ${{ inputs.module_name }}
          composer_name: ${{ inputs.composer_name }}
          magento_version: '2.4.8'
          module_source: ${{ inputs.module_source }}

  install-m249-php83:
    name: Install M2.4.9 / PHP 8.3
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports: ['3306:3306']
        options: >-
          --tmpfs /tmp:rw --tmpfs /var/lib/mysql:rw
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      es:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.22
        ports: ['9200:9200', '9300:9300']
        options: >-
          -e="discovery.type=single-node"
          -e="xpack.security.enabled=false"
          --health-cmd="curl -s http://localhost:9200/_cluster/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: extdn/github-actions-m2/magento-integration-tests/8.3@master
        with:
          module_name: ${{ inputs.module_name }}
          composer_name: ${{ inputs.composer_name }}
          magento_version: '2.4.9'
          module_source: ${{ inputs.module_source }}

  install-m249-php84:
    name: Install M2.4.9 / PHP 8.4
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports: ['3306:3306']
        options: >-
          --tmpfs /tmp:rw --tmpfs /var/lib/mysql:rw
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      es:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.22
        ports: ['9200:9200', '9300:9300']
        options: >-
          -e="discovery.type=single-node"
          -e="xpack.security.enabled=false"
          --health-cmd="curl -s http://localhost:9200/_cluster/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: extdn/github-actions-m2/magento-integration-tests/8.4@master
        with:
          module_name: ${{ inputs.module_name }}
          composer_name: ${{ inputs.composer_name }}
          magento_version: '2.4.9'
          module_source: ${{ inputs.module_source }}

  coding-standard:
    name: Magento Coding Standard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extdn/github-actions-m2/magento-coding-standard/8.3@master
        with:
          phpcs_severity: 8

  phpstan:
    name: PHPStan (M2-aware)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: extdn/github-actions-m2/magento-phpstan/8.3@master
        with:
          composer_name: ${{ inputs.composer_name }}
          module_source: ${{ inputs.module_source }}
          phpstan_level: '1'
