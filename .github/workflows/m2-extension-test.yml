name: M2 Extension Test (reusable)

on:
  workflow_call:
    inputs:
      composer_name:
        description: 'Composer package name, e.g. magepsycho/magento2-groupswitcherpro'
        required: true
        type: string
      module_name:
        description: 'Magento module name, e.g. MagePsycho_GroupSwitcherPro'
        required: true
        type: string
      php_versions:
        description: 'JSON array of PHP versions to test against'
        required: false
        type: string
        default: '["8.3", "8.4"]'
      magento_versions:
        description: 'JSON array of Magento versions to test against'
        required: false
        type: string
        default: '["2.4.8", "2.4.9"]'
      ce_or_ee:
        description: 'Magento edition: ce or ee'
        required: false
        type: string
        default: 'ce'

jobs:
  install-verify:
    name: Install M${{ matrix.magento }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJSON(inputs.php_versions) }}
        magento: ${{ fromJSON(inputs.magento_versions) }}
        exclude:
          # Magento 2.4.8 does not officially support PHP 8.4
          - magento: '2.4.8'
            php: '8.4'

    steps:
      - name: Checkout module source
        uses: actions/checkout@v4

      - name: Install Magento and module + run smoke checks
        uses: extdn/github-actions-m2/magento-integration-tests-action/8.4@master
        # NOTE: the trailing "/8.4@master" segment is a placeholder. Pin to
        # the action sub-path matching the PHP version cell and a tagged
        # release once the matrix is green. See
        # https://github.com/extdn/github-actions-m2 for current refs.
        with:
          php_version: ${{ matrix.php }}
          magento_version: ${{ matrix.magento }}
          composer_name: ${{ inputs.composer_name }}
          module_name: ${{ inputs.module_name }}
          ce_or_ee: ${{ inputs.ce_or_ee }}
          composer_version: 2

  coding-standard:
    name: Magento Coding Standard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run magento-coding-standard
        uses: extdn/github-actions-m2/magento-coding-standard/8.3@master
        with:
          module_path: src

  static-analysis:
    name: PHPStan (M2-aware)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - name: Install dev dependencies
        working-directory: src
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run PHPStan
        working-directory: src
        run: |
          if [ -f phpstan.neon ] || [ -f phpstan.neon.dist ]; then
            vendor/bin/phpstan analyse --no-progress
          else
            echo "No phpstan.neon found, skipping."
          fi
